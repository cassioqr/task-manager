<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Task Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
<div class="container mt-5">
<h1>Cadastrar tarefa</h1>

<form method="POST">

Título

<input
type="text"
name="title"
class="form-control"
required>

<br>

Descrição

<textarea
name="description"
class="form-control">
</textarea>

<br>

<!-- NOVO CAMPO DE PRIORIDADE -->

<label>Prioridade</label>

<select
name="priority"
class="form-select">

<option>Baixa</option>

<option selected>Média</option>

<option>Alta</option>

</select>

<br>

<button class="btn btn-primary">

Salvar

</button>

</form>

</div>

</body>

</html>
