<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Task Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    
    <div class="container mt-5">
    
        <h1>Editar tarefa</h1>

        <form method="POST">

        Título

        <input
        type="text"
        name="title"
        value="{{ task.title }}"
        required>

        <br><br>

        Descrição

        <textarea name="description">{{ task.description }}</textarea>

        <br><br>

        <button type="submit">
        Salvar Alterações
        </button>

        </form>

    </div>

</body>

</html>
