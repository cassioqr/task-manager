<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Task Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    
    <div class="container mt-5">
    
        <h1>Editar tarefa</h1>

        <form method="POST">

        Título

        <input
        class="form-control"
        type="text"
        name="title"
        value="{{ task.title }}"
        required>

        <br>

        Descrição

        <textarea 
        class="form-control"
        name="description">{{ task.description }}</textarea>

        <br>

        Prioridade

        <select 
        class="form-select"
        name="priority">

            <option value="Baixa"
            {% if task.priority == "Baixa" %}selected{% endif %}>
                Baixa
            </option>

            <option value="Média"
            {% if task.priority == "Média" %}selected{% endif %}>
                Média
            </option>

            <option value="Alta"
            {% if task.priority == "Alta" %}selected{% endif %}>
                Alta
            </option>

        </select>

        <br>

        <button 
        class="btn btn-primary"
        type="submit">
            Salvar Alterações
        </button>

        </form>

    </div>

</body>

</html>
