<!DOCTYPE html>
<html>

<head>
    <title>Task Manager</title>
</head>

<body>

<h1>Task Manager</h1>

<a href="/create">Nova tarefa</a>

<hr>

{% for task in tasks %}

<h3>{{ task.title }}</h3>

<p>{{ task.description }}</p>

<a href="/edit/{{task.id}}">Editar</a>

|

<a
href="/delete/{{task.id}}"
onclick="return confirm('Deseja realmente excluir esta tarefa?')">
Excluir
</a>

<hr>

{% endfor %}

</body>
</html>
